name: "fit-ai-lab"
version: "1.0.0"
description: "A real-world simulation for AI fitness and nutrition coaching."
action_space: "JSON object containing action_type (str) and payload (dict)."
observation_space: "JSON object containing feedback (str) and current_metrics (dict)."
tasks:
  - id: "task_0"
    name: "Caloric Deficit Breakfast"
    difficulty: "easy"
    description: "Agent must suggest a breakfast meal strictly under 500 calories."
  - id: "task_1"
    name: "Full Day Planning"
    difficulty: "medium"
    description: "Agent must plan exactly 3 meals (breakfast, lunch, dinner) totaling between 2000 and 2200 calories."
  - id: "task_2"
    name: "Injury Adaptation"
    difficulty: "hard"
    description: "Agent must suggest a lower-body workout avoiding knee strain (no squats or lunges)."